<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AOS Recipes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-titles">
      <h1>AOS Recipes</h1>
    </div>
    <div class="header-meta">
      <div id="counts" aria-live="polite"></div>
      <button id="themeToggle" type="button" aria-label="Toggle color theme" title="Theme: auto">Theme: auto</button>
    </div>
  </header>
  <main>
    <aside role="navigation" aria-label="Recipe list">
      <div class="sidebar-controls">
        <label>
          <span>Source</span>
          <select id="sourceFilter"></select>
        </label>
        <label>
          <span>Search</span>
          <span class="search-wrap">
            <input id="searchInput" type="search" autocomplete="off" placeholder="Search recipes…" aria-label="Search recipes">
            <button type="button" id="searchClear" aria-label="Clear search" hidden>×</button>
          </span>
        </label>
      </div>
      <div id="recipeList" role="listbox" aria-label="Recipes" tabindex="0"></div>
    </aside>
    <section id="detail" tabindex="-1" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
